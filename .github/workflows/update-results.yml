name: Update results

on:
  schedule:
    # 06:00 UTC seg/qui (~03:00 BRT) — após rodadas de fim de semana e meio de semana.
    - cron: '0 6 * * 1,4'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch results
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch_results.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain results.json)" ]; then
            git config user.name  "results-bot"
            git config user.email "actions@users.noreply.github.com"
            git add results.json
            git commit -m "chore: update results.json [skip ci]"
            git push
          else
            echo "No changes."
          fi
