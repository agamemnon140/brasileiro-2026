name: Update from CBF tables

on:
  schedule:
    # 09:00 UTC sexta (~06:00 BRT) — a CBF atualiza as Tabelas Detalhadas ao longo da semana.
    - cron: '0 9 * * 5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch CBF detailed tables (PDF) and extract results
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # cms.cbf.com.br serve a cadeia TLS incompleta; o intermediário Sectigo OV R36
          # está embarcado no repo (scripts/cbf-ca.pem, válido até 2036).
          NODE_EXTRA_CA_CERTS: ${{ github.workspace }}/scripts/cbf-ca.pem
        run: node scripts/fetch_tables.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain results.json)" ]; then
            git config user.name  "results-bot"
            git config user.email "actions@users.noreply.github.com"
            git add results.json
            git commit -m "chore: update results.json from CBF tables [skip ci]"
            git push
          else
            echo "No changes."
          fi
