.boot__logo{width:88px;height:88px;border-radius:22px;background:linear-gradient(135deg,#022c22 0%,#064e3b 55%,#022c22 100%);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;letter-spacing:-2px;color:#fff;box-shadow:0 8px 32px rgba(16,185,129,.25),0 0 0 1px rgba(16,185,129,.15);margin-bottom:18px}
.boot__logo sub{font-size:16px;font-weight:700;vertical-align:super;margin-left:2px;color:#a7f3d0}
.boot__title{font-size:18px;font-weight:600;margin-bottom:4px}
.boot__subtitle{font-size:12px;opacity:.7;margin-bottom:20px}
.boot__bar{width:200px;height:3px;background:rgba(16,185,129,.2);border-radius:99px;overflow:hidden}
.boot__bar::after{content:'';display:block;width:40%;height:100%;background:linear-gradient(90deg,transparent,#10b981,transparent);animation:slide 1.4s ease-in-out infinite}
@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
</style>
</head>
<body>
<div class="boot" id="boot"><div class="boot__logo">B<sub>26</sub></div><div class="boot__title">Brasileirão 2026</div><div class="boot__subtitle">Carregando simulador…</div><div class="boot__bar"></div></div>

// Diagnóstico de integridade: verifica quantos resultados reais de cada série
// casam com a fixture. Para A/B/C usa match exato casa/fora/rodada (a CBF é a
// fonte das fixtures). Para D usa pairKey (agnóstico a mandante/ordem do par).
// Retorna também o ratio "seria casado pelo método antigo" para a D, documentando
// o impacto do fix implementado na v4.3.
const dataHealthReport = (SAT, SBT, SCT) => {
  const rep = {};
  // A/B/C: match exato
  const checkExact = (fixture, results, teams) => {
    const teamSet = new Set(teams);
    const fSet = new Set(fixture.map(j => "".concat(j.casa, "|").concat(j.fora, "|").concat(j.rodada)));
    const misses = [];
    for (const r of results) {
      if (!teamSet.has(r.c) || !teamSet.has(r.f)) {
        misses.push({
          ...r,
          reason: 'time desconhecido'
        });
        continue;
      }
      if (!fSet.has("".concat(r.c, "|").concat(r.f, "|").concat(r.r))) {
        misses.push({
          ...r,
          reason: 'par/rodada não existe na fixture'
        });
      }
    }
    return {
      total: results.length,
      matched: results.length - misses.length,
      misses
    };
  };
  rep.A = checkExact(SAT, SA_RES, Object.keys(SA_RANKING));
  rep.B = checkExact(SBT, SB_RES, Object.keys(SB_RANKING));
  rep.C = checkExact(SCT, SC_RES, Object.keys(SC_RANKING));
  // D: método antigo (match exato) vs novo (pairKey)
  const tabD = SD_REAL_TAB;
  const tabDExactSet = new Set(tabD.map(j => "".concat(j.casa, "|").concat(j.fora, "|").concat(j.rodada)));
  const tabDPairSet = new Set(tabD.map(j => pairKey(j.casa, j.fora, j.rodada)));
  const teamSetD = new Set(SD_TIMES);
  let dExact = 0,
    dPair = 0;
  const dMisses = [];
  for (const r of SD_RES) {
    if (!teamSetD.has(r.c) || !teamSetD.has(r.f)) {
      dMisses.push({
        ...r,
        reason: 'time desconhecido'
      });
      continue;
    }
    if (tabDExactSet.has("".concat(r.c, "|").concat(r.f, "|").concat(r.r))) dExact++;
    if (tabDPairSet.has(pairKey(r.c, r.f, r.r))) dPair++;else dMisses.push({
      ...r,
      reason: 'par/turno não existe na fixture'
    });
  }
  rep.D = {
    total: SD_RES.length,
    matched: dPair,
    matchedOld: dExact,
    misses: dMisses
  };
  return rep;
};
