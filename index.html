const metricsOf = preds => {

    n: 0,
    brier: 0,
    brierUnif: 0,
    brierBase: 0,
    logloss: 0,
    loglossUnif: Math.log(3),
    acc: 0,
    homeRate: 0
  };
  let oH = 0,
    oD = 0,
    oA = 0;
  preds.forEach(p => {
    oH += p.oH;
    oD += p.oD;
    oA += p.oA;
  });
  const bH = oH / n,
    bD = oD / n,
    bA = oA / n,
    u = 1 / 3;
  let brier = 0,
    brierUnif = 0,
    brierBase = 0,
    logloss = 0,
    accFav = 0;
  preds.forEach(p => {
    brier += brierOf(p);
    brierUnif += Math.pow(u - p.oH, 2) + Math.pow(u - p.oD, 2) + Math.pow(u - p.oA, 2);

    n,
    brier: brier / n,
    brierUnif: brierUnif / n,
    brierBase: brierBase / n,
    logloss: logloss / n,

      res: SA_RES,
      sk: 'A'

    B: {

      ge: t => SB_RANKING[t].elo,

    mc: cm,
    mf: cf
  } = getML(cfg, 'CB');
  const apply = (mandante, visitante, gM, gV) => {
    const inM = el2[mandante] !== undefined,
      inV = el2[visitante] !== undefined;
    if (!inM && !inV) return;
    const eM = inM ? el2[mandante] : CB_ELOS[mandante] || 1200;
    const eV = inV ? el2[visitante] : CB_ELOS[visitante] || 1200;
    const aM = inM ? at2[mandante] : lg.initAD(eM).atk;
    const aV = inV ? at2[visitante] : lg.initAD(eV).atk;
    const dM = inM ? df2[mandante] : lg.initAD(eM).def;
    const dV = inV ? df2[visitante] : lg.initAD(eV).def;
    const {
      lC,
      lF
    } = calcL(aM, dM, aV, dV, eM, eV, cm, cf, cfg.homeAdv, eo, cfg.c0Log);
    const elsT = {
      [mandante]: eM,
      [visitante]: eV
    };
    const atkT = {
      [mandante]: aM,
      [visitante]: aV
    };
    const defT = {
      [mandante]: dM,
      [visitante]: dV
    };
    updR(elsT, atkT, defT, mandante, visitante, gM, gV, lC, lF, cfg, ak, eo);
    if (inM) {
      el2[mandante] = elsT[mandante];
      at2[mandante] = atkT[mandante];
      df2[mandante] = defT[mandante];
    }
    if (inV) {
      el2[visitante] = elsT[visitante];
      at2[visitante] = atkT[visitante];
      df2[visitante] = defT[visitante];
    }
  };
  CB_R32.forEach(([ia, ib], idx) => {
    const a = CB_TEAMS[ia],
      b = CB_TEAMS[ib];
    const ida = CB_RES_IDA[idx],
      volta = CB_RES_VOLTA[idx];
    if (ida) apply(a, b, ida.ga, ida.gb);
    if (volta) apply(b, a, volta.ga, volta.gb); // mando inverte na volta
  });
};

// após aplicar cronologicamente todos os resultados reais (SA_RES, SB_RES, SC_RES,

    def = {};

      const i = lg.initAD(elos[t]);
      atk[t] = i.atk;
      def[t] = i.def;

  initFor(SD_TIMES, t => SD_INFO[t].elo, 'D');

      const {

const calcClassif = (times, res) => {

      P: 0,
      J: 0,
      V: 0,
      E: 0,
      D: 0,
      GP: 0,
      GC: 0
    };
  });
  res.forEach(r => {
    if (!s[r.c] || !s[r.f]) return;
    s[r.c].J++;
    s[r.f].J++;
    s[r.c].GP += r.gc;
    s[r.c].GC += r.gf;
    s[r.f].GP += r.gf;
    s[r.f].GC += r.gc;
    if (r.gc > r.gf) {
      s[r.c].V++;
      s[r.c].P += 3;
      s[r.f].D++;
    } else if (r.gc === r.gf) {
      s[r.c].E++;
      s[r.f].E++;
      s[r.c].P++;
      s[r.f].P++;
    } else {
      s[r.f].V++;
      s[r.f].P += 3;
      s[r.c].D++;
    }
  });

    time: t,
    ...s[t],
    SG: s[t].GP - s[t].GC

      for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) {
        if (i === j) continue;
        const c = grupo[i],
          f = grupo[j];
        const {
          lC,
          lF
        } = calcL(at[c], df[c], at[f], df[f], el[c], el[f], mc, mf, cfg.homeAdv, eo, cfg.c0Log);
        const gc = poissonRandom(lC),
          gf = poissonRandom(lF);
        qst[c].GP += gc;
        qst[c].GC += gf;
        qst[f].GP += gf;
        qst[f].GC += gc;
        if (gc > gf) {
          qst[c].V++;
          qst[c].P += 3;
          qst[f].D++;
        } else if (gc === gf) {
          qst[c].E++;
          qst[f].E++;
          qst[c].P++;
          qst[f].P++;
        } else {
          qst[f].V++;
          qst[f].P += 3;
          qst[c].D++;
        }
      }
      return grupo.map(t => ({
        time: t,
        ...qst[t],
        SG: qst[t].GP - qst[t].GC
      })).sort((a, b) => b.P - a.P || b.V - a.V || b.SG - a.SG || b.GP - a.GP);
    };
    const resA = quadGroupSim(gA),
      resB = quadGroupSim(gB);
    // Top-2 de cada grupo acessam; 1º de cada grupo joga a final (título Série C)
    [resA[0], resA[1], resB[0], resB[1]].forEach(r => extraStats[r.time].q4++);
    // Final Série C: 1º A × 1º B em ida e volta, agregado de gols, empate → pênaltis.
    // Mandante da volta = melhor campanha (aproximação: melhor pontuação na fase
    // de grupos do quadrangular; usamos P como tiebreaker).
    const fa = resA[0].time,
      fb = resB[0].time;
    if (extraStats[fa].matchups) {
      extraStats[fa].matchups.camp[fb] = (extraStats[fa].matchups.camp[fb] || 0) + 1;
      extraStats[fb].matchups.camp[fa] = (extraStats[fb].matchups.camp[fa] || 0) + 1;
    }
    // Define mandante da volta por P (pts no quadrangular); empate → fa (1ºA arbitrário)
    const paS = resA[0].P,
      pbS = resB[0].P;
    const voltaMandante = paS >= pbS ? fa : fb;
    const idaMandante = voltaMandante === fa ? fb : fa;
    // Ida (idaMandante em casa)
    const {
      lC: il1,
      lF: il2
    } = calcL(at[idaMandante], df[idaMandante], at[voltaMandante], df[voltaMandante], el[idaMandante], el[voltaMandante], mc, mf, cfg.homeAdv, eo, cfg.c0Log);
    const ig1 = poissonRandom(il1),
      ig2 = poissonRandom(il2);
    // Volta (voltaMandante em casa)
    const {
      lC: vl1,
      lF: vl2
    } = calcL(at[voltaMandante], df[voltaMandante], at[idaMandante], df[idaMandante], el[voltaMandante], el[idaMandante], mc, mf, cfg.homeAdv, eo, cfg.c0Log);
    const vg1 = poissonRandom(vl1),
      vg2 = poissonRandom(vl2);
    // Agregado
    const aggVM = ig2 + vg1; // voltaMandante total

    let camp;
    if (aggVM > aggIM) camp = voltaMandante;else if (aggIM > aggVM) camp = idaMandante;else camp = Math.random() < 0.5 ? voltaMandante : idaMandante; // pênaltis

const simMC_finalize = (times, ct, pts, posF, ptsAtPos, nS, elFinal, extraStats, atFinal, dfFinal, ranking, initAD, nReb) => {
  const pctl = (arr, q) => {
    if (!arr.length) return 0;
    const s = [...arr].sort((a, b) => a - b);
    return s[Math.floor(s.length * q)] || 0;
  };
  const pc = pos => ({
    p10: pctl(ptsAtPos[pos], 0.1),
    p50: pctl(ptsAtPos[pos], 0.5),
    p90: pctl(ptsAtPos[pos], 0.9)
  });
  // Converte mapas {adversario: count} em arrays [{adv, pct, count}] ordenados desc.
  const normPhase = m => {
    const total = Object.values(m).reduce((s, v) => s + v, 0);
    return Object.entries(m).map(([adv, c]) => ({
      adv,
      pct: total > 0 ? c / total * 100 : 0,
      count: c
    })).sort((a, b) => b.pct - a.pct);
  };
  const avg = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
  return {
    probs: times.map(t => {
      const o = {
        time: t,
        titulo: ct[t].t / nS * 100,
        g4: ct[t].g4 / nS * 100,
        z4: ct[t].z4 / nS * 100,
        mediaPts: pts[t].reduce((s, p) => s + p, 0) / nS,
        medianPts: pctl(pts[t], 0.5),
        p10Pts: pctl(pts[t], 0.1),
        p90Pts: pctl(pts[t], 0.9),
        posF: posF[t].map(v => v / nS * 100),
        ptsSamples: pts[t]
      };
      if (elFinal) {
        o.eloFinal = Math.round(avg(elFinal[t]));
      }
      // atk/def: iniciais = initAD (calculado via lg.initAD do Elo nominal do ranking);
      // finais = média sobre N simulações (captura evolução das rodadas reais + drift).
      if (initAD && initAD[t]) {
        o.atk = initAD[t].atk;
        o.def = initAD[t].def;
      }
      if (atFinal && atFinal[t]) o.atkFinal = avg(atFinal[t]);
      if (dfFinal && dfFinal[t]) o.defFinal = avg(dfFinal[t]);
      if (extraStats && extraStats[t]) {
        if (extraStats[t].q4 !== undefined) {
          o.q4 = extraStats[t].q4 / nS * 100;
          o.qChamp = extraStats[t].qChamp / nS * 100;
        }
        if (extraStats[t].bAccess !== undefined) {
          o.bPlayoff = extraStats[t].bPlayoff / nS * 100;
          o.bAccess = extraStats[t].bAccess / nS * 100;
        }
        if (extraStats[t].matchups) {
          o.matchups = {};
          for (const fase in extraStats[t].matchups) o.matchups[fase] = normPhase(extraStats[t].matchups[fase]);
        }
      }
      return o;
    }).sort((a, b) => b.mediaPts - a.mediaPts),
    nSims: nS,
    cortes: {
      titulo: pc(0),
      g4: pc(3),
      meio: pc(Math.floor(times.length / 2)),
      z4: pc(times.length - (nReb || 4)),
      ultimo: pc(times.length - 1)
    }
  };
};

// Roda simMC em chunks via requestAnimationFrame, reportando progresso 0-1.
// onProgress(completed, total) chamado ~a cada frame. onDone(result) ao final.
// IMPORTANTE: aplica os jogos confirmados da Copa do Brasil ao estado inicial
// via applyCBToLeague — isso garante que efeitos de CB (vitórias/derrotas em mata-mata)
// se propaguem para o Elo/atk/def usados nas simulações de A/B/C também. Match
// chronological order: CB ida (Apr 21-23) ocorre no meio da temporada, mas para
// simplicidade aplicamos no estado inicial — o impacto na ordem é pequeno (Elo
// dynamics são aproximadamente comutativas para shifts pequenos).
const simMC_async = (times, ranking, tab, res, cfg, sk, nS, ak, eo, onProgress, onDone) => {
  const lg = initLeague(times, t => ranking[t].elo, cfg);
  const {
    mc,
    mf
  } = getML(cfg, sk);
  const ct = {},
    pts = {},
    posF = {},
    elFinal = {},
    atFinal = {},
    dfFinal = {};
  const extraStats = sk === 'C' || sk === 'B' ? {} : null;
  const ptsAtPos = Array.from({
    length: times.length
  }, () => []);
  const initAD = {};
  times.forEach(t => {
    initAD[t] = lg.initAD(ranking[t].elo);
  });
  // Estado inicial unificado (Elos + atk/def) com CB aplicado — usado em cada sim
  // para refletir efeitos cruzados entre A/B/C/D e Copa do Brasil.
  const initialAD = {
    el: {},
    at: {},
    df: {}
  };
  times.forEach(t => {
    initialAD.el[t] = ranking[t].elo;
    initialAD.at[t] = initAD[t].atk;
    initialAD.df[t] = initAD[t].def;
  });
  applyCBToLeague(initialAD.el, initialAD.at, initialAD.df, lg, cfg, ak, eo);
  times.forEach(t => {
    ct[t] = {
      t: 0,
      g4: 0,
      z4: 0
    };
    pts[t] = [];
    posF[t] = new Array(times.length).fill(0);
    elFinal[t] = [];
    atFinal[t] = [];
    dfFinal[t] = [];
    if (extraStats) {
      if (sk === 'C') extraStats[t] = {
        q4: 0,
        qChamp: 0,
        matchups: {
          quad: {},
          camp: {}
        }
      };else if (sk === 'B') extraStats[t] = {
        bPlayoff: 0,
        bAccess: 0,
        matchups: {
          po: {}
        }
      };
    }
  });
  const chunk = Math.max(20, Math.floor(nS / 40));
  let done = 0;
  const run = () => {
    const end = Math.min(done + chunk, nS);
    for (; done < end; done++) simMC_single(times, ranking, tab, res, cfg, sk, ak, eo, lg, mc, mf, ct, pts, posF, ptsAtPos, elFinal, extraStats, atFinal, dfFinal, initialAD);
    onProgress(done, nS);
    if (done < nS) requestAnimationFrame(run);else onDone(simMC_finalize(times, ct, pts, posF, ptsAtPos, nS, elFinal, extraStats, atFinal, dfFinal, ranking, initAD, sk === 'C' ? 2 : 4));
  };
  requestAnimationFrame(run);
};
const simUnica = (times, ranking, tab, res, cfg, sk, ak, eo) => {
  const lg = initLeague(times, t => ranking[t].elo, cfg);
  const {
    mc,
    mf
  } = getML(cfg, sk);
  const st = {},
    el = {},
    at = {},
    df = {};
  times.forEach(t => {
    st[t] = {
      P: 0,
      J: 0,
      V: 0,
      E: 0,
      D: 0,
      GP: 0,
      GC: 0
    };
    el[t] = ranking[t].elo;
    const i = lg.initAD(ranking[t].elo);
    at[t] = i.atk;
    df[t] = i.def;
  });
  const jogos = [];
  let lastDR = 0;
  const maxRR = Math.max(0, ...res.map(r => r.r));
  for (const j of tab) {
    const {
      casa: c,
      fora: f,
      rodada: rd
    } = j;
    if (!st[c] || !st[f]) continue;
    if (rd > lastDR && rd > maxRR && cfg.drift > 0) {
      lastDR = rd;
      applyDrift(times, el, at, df, cfg.drift);
    }
    const real = res.find(r => r.c === c && r.f === f && (r.r === rd || r.r === 0));
    let gc, gf;
    if (real) {
      gc = real.gc;
      gf = real.gf;
    } else {
      const {
        lC,
        lF
      } = calcL(at[c], df[c], at[f], df[f], el[c], el[f], mc, mf, cfg.homeAdv, eo, cfg.c0Log);
      gc = poissonRandom(lC);
      gf = poissonRandom(lF);
    }
    jogos.push({
      casa: c,
      fora: f,
      gc,
      gf,
      rodada: rd,
      real: !!real,
      data: j.data || ''
    });
    st[c].J++;
    st[f].J++;
    st[c].GP += gc;
    st[c].GC += gf;
    st[f].GP += gf;
    st[f].GC += gc;
    if (gc > gf) {
      st[c].V++;
      st[c].P += 3;
      st[f].D++;
    } else if (gc === gf) {
      st[c].E++;
      st[f].E++;
      st[c].P++;
      st[f].P++;
    } else {
      st[f].V++;
      st[f].P += 3;
      st[c].D++;
    }
    const {
      lC,
      lF
    } = calcL(at[c], df[c], at[f], df[f], el[c], el[f], mc, mf, cfg.homeAdv, eo, cfg.c0Log);
    if (real) updR(el, at, df, c, f, gc, gf, lC, lF, cfg, ak, eo);
  }
  return {
    classificacao: times.map(t => ({
      time: t,
      ...st[t],
      SG: st[t].GP - st[t].GC
    })).sort((a, b) => b.P - a.P || b.V - a.V || b.SG - a.SG || b.GP - a.GP).map((c, i) => ({
      ...c,
      pos: i + 1
    })),
    jogos
  };
};

// === MC SÉRIE D (para Simular Tudo) ===
// Helpers da Série D:
//   pairKey: identifica um par de times em determinado turno (1-5 ou 6-10),
//            independente de quem é mandante/visitante. Isso torna o casamento
//            com SD_RES robusto a diferenças entre a tabela oficial da CBF e a
//            gerada algoritmicamente por genGrpTab.
//   prepareSerieDState: processa SD_RES uma única vez aplicando updR e gerando
//            o snapshot {el, at, df, st, jogados, maxRR, lg}. Cacheável.
//   cloneSDState: clona o snapshot para cada simulação sem reprocessar SD_RES.
const pairKey = (a, b, r) => [a, b].sort().join('|') + '|' + (r <= 5 ? 1 : 2);
const cloneSDState = snap => {
  const el = {
      ...snap.el

    at = {
      ...snap.at
    },
    df = {
      ...snap.df
    },
    st = {};
  for (const t in snap.st) st[t] = {
    ...snap.st[t]
  };
  return {
    el,
    at,
    df,
    st
  };
};
const prepareSerieDState = (cfg, eo, ak, extra) => {
  const lg = initLeague(SD_TIMES, t => SD_INFO[t].elo, cfg);
  const {
    mc,
    mf
  } = getML(cfg, 'D');
  const el = {},
    at = {},
    df = {},
    atI = {},
    dfI = {},
    st = {},
    jogados = new Set();
  SD_TIMES.forEach(t => {
    el[t] = SD_INFO[t].elo;
    const i = lg.initAD(SD_INFO[t].elo);
    at[t] = i.atk;
    df[t] = i.def;
    atI[t] = i.atk;
    dfI[t] = i.def;
    st[t] = {
      P: 0,
      J: 0,
      V: 0,
      E: 0,
      D: 0,
      GP: 0,
      GC: 0
    };
  });
  let RES = SD_RES;
  if (extra && extra.length) {
    const seen = new Set(SD_RES.map(r => r.c + '|' + r.f));
    RES = [...SD_RES, ...extra.filter(r => !seen.has(r.c + '|' + r.f))];
  }
  for (const r of RES) {
    const c = r.c,
      f = r.f;
    if (!st[c] || !st[f]) continue;
    const {
      lC,
      lF
    } = calcL(at[c], df[c], at[f], df[f], el[c], el[f], mc, mf, cfg.homeAdv, eo, cfg.c0Log);
    st[c].J++;
    st[f].J++;
    st[c].GP += r.gc;
    st[c].GC += r.gf;
    st[f].GP += r.gf;
    st[f].GC += r.gc;
    if (r.gc > r.gf) {
      st[c].V++;
      st[c].P += 3;
      st[f].D++;
    } else if (r.gc === r.gf) {
      st[c].E++;
      st[f].E++;
      st[c].P++;
      st[f].P++;
    } else {
      st[f].V++;
      st[f].P += 3;
      st[c].D++;
    }
    updR(el, at, df, c, f, r.gc, r.gf, lC, lF, cfg, ak, eo);
    jogados.add(pairKey(c, f, r.r));
  }
  // Aplica jogos da Copa do Brasil onde algum time da Série D participou (ex: Jacuipense, Barra-SC)
  applyCBToLeague(el, at, df, lg, cfg, ak, eo);
  const maxRR = Math.max(0, ...RES.map(r => r.r));
  return {
    el,
    at,
    df,
    atI,
    dfI,
    st,
    jogados,

};
// Corpo de 1 simulação completa da Série D (grupos + mata-mata).
// Recebe snap, tabD, ct (acumuladores); muta ct.
// ct[t] deve ter: {cl, grupoTop1, f2, f3, oit, qf, sf, fin, ac, ch, elFinalSum}
const simMC_D_single = (cfg, ak, eo, snap, tabD, ct, mc, mf, gpts, ufAcc, ufTeams) => {
  const {
    el,
    at,
    df,
    st
  } = cloneSDState(snap);
  let lastDR = 0;
  for (const j of tabD) {
    if (snap.jogados.has(pairKey(j.casa, j.fora, j.rodada))) continue;
    if (j.rodada > lastDR && j.rodada > snap.maxRR && cfg.drift > 0) {
      lastDR = j.rodada;
      applyDrift(SD_TIMES, el, at, df, cfg.drift);
    }
    const {
      lC,
      lF
    } = calcL(at[j.casa], df[j.casa], at[j.fora], df[j.fora], el[j.casa], el[j.fora], mc, mf, cfg.homeAdv, eo, cfg.c0Log);
    const gc = poissonRandom(lC),
      gf = poissonRandom(lF);
    st[j.casa].J++;
    st[j.fora].J++;
    st[j.casa].GP += gc;
    st[j.casa].GC += gf;
    st[j.fora].GP += gf;
    st[j.fora].GC += gc;
    if (gc > gf) {
      st[j.casa].V++;
      st[j.casa].P += 3;
      st[j.fora].D++;
    } else if (gc === gf) {
      st[j.casa].E++;
      st[j.fora].E++;
      st[j.casa].P++;
      st[j.fora].P++;
    } else {
      st[j.fora].V++;
      st[j.fora].P += 3;
      st[j.casa].D++;
    }
    updR(el, at, df, j.casa, j.fora, gc, gf, lC, lF, cfg, ak, eo);
  }
  // Elo final acumulado para todos (usado p/ calcular média ao fim).
  // Também acumula pontos finais da fase de grupos para histograma por grupo
  // e soma atk/def finais (para mostrar médias atk/def finais).
  SD_TIMES.forEach(t => {
    ct[t].elFinalSum += el[t];
    ct[t].atSum += at[t];
    ct[t].dfSum += df[t];
    if (ct[t].ptsSamples) ct[t].ptsSamples.push(st[t].P);
  });
  // Classificação completa do grupo (1º ao 6º). Top-4 avançam (cl), top-1 = grupoTop1.
  // posGr[i] acumula quantas vezes o time terminou na (i+1)ª posição do seu grupo.
  // gpts[gIdx][pos] acumula a pontuação do time na (pos+1)ª posição (pos 0-3 = 1º-4º).
  const gruposRanked = SD_GRUPOS.map(g => g.map(t => ({
    time: t,
    ...st[t],
    SG: st[t].GP - st[t].GC
  })).sort((a, b) => b.P - a.P || b.V - a.V || b.SG - a.SG || b.GP - a.GP));
  // SEMÂNTICA DAS CHAVES (refator v4.24): cada métrica significa "CHEGOU a essa fase".
  //   f2  = top-4 do grupo (chegou à 2ª fase) — 64 times/sim
  //   f3  = venceu 2ª fase (chegou à 3ª fase) — 32 times/sim
  //   oit = venceu 3ª fase (chegou às oitavas) — 16 times/sim
  //   qf  = venceu oitavas (chegou às quartas) — 8 times/sim
  //   sf  = venceu quartas (chegou à semi)    — 4 times/sim
  //   fin = venceu semi (chegou à final)       — 2 times/sim
  //   ch  = venceu final (campeão)             — 1 time/sim
  // Antes da v4.24 cada chave significava "VENCEU essa fase" (deslocada uma posição).
  gruposRanked.forEach((g, gIdx) => {
    g.forEach((row, pos) => {
      ct[row.time].posGr[pos]++;
      if (pos < 4) ct[row.time].f2++;
      if (pos === 0) ct[row.time].grupoTop1++;
      if (pos < 4 && gpts) gpts[gIdx][pos].push(row.P);
    });
  });
  const gruposTop4 = gruposRanked.map(g => g.slice(0, 4).map(c2 => c2.time));
  // Helper: registra cruzamento em matchups. ct[t].matchups[fase] = {adv: count}.
  const bumpMu = (t, fase, adv) => {
    if (!ct[t].matchups) return;
    const m = ct[t].matchups;
    if (!m[fase]) m[fase] = {};
    m[fase][adv] = (m[fase][adv] || 0) + 1;
  };
  const s180 = (a, b) => {
    const real = sdKoReal(a, b);
    if (real) return real.w; // confronto real já decidido: usa o vencedor de verdade
    const r2 = eo ? (() => {
      const d = el[a] - el[b];
      const e = 1 / (1 + Math.pow(10, -d / 400));
      return {
        lC: 2 * cfg.mnMM * (0.5 + e),
        lF: 2 * cfg.mnMM * (0.5 + (1 - e))
      };
    })() : {
      lC: Math.max(0.2, 2 * cfg.mnMM * at[a] * df[b]),
      lF: Math.max(0.2, 2 * cfg.mnMM * at[b] * df[a])
    };
    const ga = poissonRandom(r2.lC),
      gb = poissonRandom(r2.lF);
    return ga > gb ? a : gb > ga ? b : Math.random() < 0.5 ? a : b;
  };
  // === Mata-mata: chaveamento OFICIAL CBF — 2ª/3ª/oitavas FIXO; quartas+ reseed por campanha ===
  // Grupos completos → top-4 determinístico; confrontos vêm de SD_F2_REAL (2ª fase) e SD_BRK_PAIRS
  // (3ª/oitavas). s180 já aplica SD_KO_REAL (resultados reais) nos confrontos decididos.
  // 2ª fase (32 confrontos oficiais B01-B32).
  const winB = {};
  for (const t of SD_F2_REAL) {
    bumpMu(t.a, 'f2', t.b);
    bumpMu(t.b, 'f2', t.a);
    winB[t.code] = s180(t.a, t.b);
  }
  const winF2 = Object.values(winB); // 32 → chegam à 3ª fase
  winF2.forEach(t => ct[t].f3++);
  // 3ª fase (C = Venc.B × Venc.B, fixo)
  const winC = {};
  for (const code of SD_C_CODES) {
    const p = SD_BRK_PAIRS[code],
      a = winB[p[0]],
      b = winB[p[1]];
    bumpMu(a, 'f3', b);
    bumpMu(b, 'f3', a);
    winC[code] = s180(a, b);
  }
  const winF3 = Object.values(winC); // 16 → chegam às oitavas
  winF3.forEach(t => ct[t].oit++);
  // Oitavas (D = Venc.C × Venc.C, FIXO — sem reseed)
  const winD = {};
  for (const code of SD_D_CODES) {
    const p = SD_BRK_PAIRS[code],
      a = winC[p[0]],
      b = winC[p[1]];
    bumpMu(a, 'oit', b);
    bumpMu(b, 'oit', a);
    winD[code] = s180(a, b);
  }
  const winOit = Object.values(winD); // 8 → chegam às quartas
  winOit.forEach(t => ct[t].qf++);
  // Quartas (reseed por campanha do "Bloco I": 1×8, 4×5, 2×7, 3×6)
  const camp8 = (a, b) => st[b].P - st[a].P || st[b].GP - st[b].GC - (st[a].GP - st[a].GC) || st[b].GP - st[a].GP;
  const r8 = [...winOit].sort(camp8);
  const qW = [],
    qL = [];
  for (const [i, j] of [[0, 7], [3, 4], [1, 6], [2, 5]]) {
    const a = r8[i],
      b = r8[j];
    bumpMu(a, 'qf', b);
    bumpMu(b, 'qf', a);
    const w = s180(a, b);
    qW.push(w);
    qL.push(w === a ? b : a);
  }
  qW.forEach(t => ct[t].sf++);
  // === Semi + Playoff + Final ===
  qW.forEach(t => ct[t].ac++); // 4 semifinalistas acessam
  // Playoff de acesso: 4 perdedores das quartas reseed por campanha (1×4, 2×3)
  const pL = [...qL].sort(camp8);
  bumpMu(pL[0], 'po', pL[3]);
  bumpMu(pL[3], 'po', pL[0]);
  bumpMu(pL[1], 'po', pL[2]);
  bumpMu(pL[2], 'po', pL[1]);
  const playoff = [s180(pL[0], pL[3]), s180(pL[1], pL[2])];
  playoff.forEach(t => ct[t].ac++); // +2 vencedores playoff
  // Semi
  bumpMu(qW[0], 'sf', qW[1]);
  bumpMu(qW[1], 'sf', qW[0]);
  bumpMu(qW[2], 'sf', qW[3]);
  bumpMu(qW[3], 'sf', qW[2]);
  const sf1 = s180(qW[0], qW[1]),
    sf2 = s180(qW[2], qW[3]);
  ct[sf1].fin++;
  ct[sf2].fin++;
  // Final
  bumpMu(sf1, 'fin', sf2);
  bumpMu(sf2, 'fin', sf1);
  const champ = s180(sf1, sf2);
  ct[champ].ch++;
  // === Distribuição CONJUNTA por estado (v4.47) ===
  // Para cada fase, conta quantos times de cada UF chegaram e incrementa o
  // histograma ufAcc[uf][fase][k]. Os conjuntos abaixo já têm times únicos:
  // f2=top-4 (64), f3=winF2 (32), oit=winF3 (16), qf=winOit (8), sf=qW (4),
  // fin=2 finalistas, ac=4 semifinalistas + 2 do playoff (6 vagas de acesso).
  if (ufAcc) {
    const phaseSets = {
      f2: gruposTop4.flat(),
      f3: winF2,
      oit: winF3,
      qf: winOit,
      sf: qW,
      fin: [sf1, sf2],
      ac: [...qW, ...playoff]
    };
    for (const ph in phaseSets) {
      const cnt = {};
      for (const t of phaseSets[ph]) {
        const u = SD_INFO[t].uf;
        cnt[u] = (cnt[u] || 0) + 1;
      }
      for (const u in ufTeams) ufAcc[u][ph][cnt[u] || 0]++;

  }
};
// Fases rastreadas na distribuição por estado (mesma semântica "chegou à fase").
const SD_UF_PHASES = ['f2', 'f3', 'oit', 'qf', 'sf', 'fin', 'ac'];
// Constrói ufTeams (UF→[times]) e ufAcc (histogramas zerados) para uma rodada de sims.
const buildUfAcc = () => {
  const ufTeams = {};
  SD_TIMES.forEach(t => {
    const u = SD_INFO[t].uf;
    (ufTeams[u] = ufTeams[u] || []).push(t);
  });
  const ufAcc = {};
  Object.keys(ufTeams).forEach(u => {
    ufAcc[u] = {};
    SD_UF_PHASES.forEach(p => {
      ufAcc[u][p] = new Array(ufTeams[u].length + 1).fill(0);
    });
  });
  return {
    ufTeams,
    ufAcc
  };
};
const simMC_D_finalize = (snap, ct, nS, gpts, ufAcc, ufTeams) => {
  // Normaliza matchups do time: {adv: count} por fase → array [{adv, pct, count}] desc.
  const normMu = mu => {
    const out = {};
    for (const fase in mu) {
      const m = mu[fase];
      const total = Object.values(m).reduce((s, v) => s + v, 0);
      out[fase] = Object.entries(m).map(([adv, c]) => ({
        adv,
        pct: total > 0 ? c / total * 100 : 0,
        count: c
      })).sort((a, b) => b.pct - a.pct);
    }
    return out;
  };
  const pctl = (arr, q) => {
    if (!arr || !arr.length) return 0;
    const s = [...arr].sort((a, b) => a - b);
    return s[Math.floor(s.length * q)] || 0;
  };
  // Cortes esperados de pontos por grupo × posição (1º-4º). Para cada grupo gIdx
  // e posição pos (0-3), pctsPos[gIdx][pos] = {p10, p50, p90} dos pontos amostrais.
  const ptsCutsByGroup = gpts ? gpts.map(grp => grp.map(arr => ({
    p10: pctl(arr, 0.1),
    p50: pctl(arr, 0.5),
    p90: pctl(arr, 0.9)
  }))) : null;
  return {
    probs: SD_TIMES.map(t => ({
      time: t,
      uf: SD_INFO[t].uf,
      grupo: SD_INFO[t].grupo,
      elo: SD_INFO[t].elo,
      eloAtual: Math.round(snap.el[t]),
      atk: snap.at[t],
      def: snap.df[t],
      atkFinal: ct[t].atSum / nS,
      defFinal: ct[t].dfSum / nS,
      dE: Math.round(snap.el[t] - SD_INFO[t].elo),
      eloFinal: Math.round(ct[t].elFinalSum / nS),
      grupoTop1: ct[t].grupoTop1 / nS * 100,
      posGr: ct[t].posGr.map(v => v / nS * 100),
      f2: ct[t].f2 / nS * 100,
      f3: ct[t].f3 / nS * 100,
      oit: ct[t].oit / nS * 100,
      qf: ct[t].qf / nS * 100,
      sf: ct[t].sf / nS * 100,
      fin: ct[t].fin / nS * 100,
      ac: ct[t].ac / nS * 100,
      ch: ct[t].ch / nS * 100,
      ptsSamples: ct[t].ptsSamples,
      medianPts: pctl(ct[t].ptsSamples, 0.5),
      p10Pts: pctl(ct[t].ptsSamples, 0.1),
      p90Pts: pctl(ct[t].ptsSamples, 0.9),
      mediaPts: ct[t].ptsSamples && ct[t].ptsSamples.length ? ct[t].ptsSamples.reduce((s, p) => s + p, 0) / ct[t].ptsSamples.length : 0,
      matchups: normMu(ct[t].matchups)
    })).sort((a, b) => b.ac - a.ac || b.elo - a.elo),
    nSims: nS,
    ptsCutsByGroup,
    ufDist: buildUfDist(ufAcc, ufTeams, nS)
  };
};
// Normaliza ufAcc em ufDist: por UF e fase, {pcts:[P(k)%], E:nº esperado}.
// Ordenado por E[acesso] desc (mesma lógica do ranking principal). null se ausente.
const buildUfDist = (ufAcc, ufTeams, nS) => {
  if (!ufAcc) return null;
  return Object.keys(ufAcc).map(u => {
    const o = {
      uf: u,
      n: ufTeams[u].length
    };
    SD_UF_PHASES.forEach(p => {
      const arr = ufAcc[u][p];
      o[p] = {
        pcts: arr.map(c => c / nS * 100),
        E: arr.reduce((s, c, k) => s + c * k, 0) / nS
      };
    });
    return o;
  }).sort((a, b) => b.ac.E - a.ac.E);
};

// === MC COPA DO BRASIL ===
// teamElos: Elos por time (evoluídos das sims A/B/C/D quando disponíveis).
// teamAD: atk/def por time (evoluídos idem). Fallback: lg.initAD(elo) como antes.
const simMC_CB = (cfg, nS, ak, eo, teamElos, teamAD) => {
  const teams = CB_TEAMS;
  const elos = {};
  teams.forEach(t => elos[t] = teamElos[t] || CB_ELOS[t] || 1200);
  const lg = initLeague(teams, t => elos[t], cfg);
  const ct = {};
  const matchups = {};
  // matchups[time][fase] = {adversario: count}. Fases: r32, r16, qf, sf, fin.
  teams.forEach(t => {
    ct[t] = {
      r16: 0,
      qf: 0,
      sf: 0,
      fin: 0,
      ch: 0
    };
    matchups[t] = {
      r32: {},
      r16: {},
      qf: {},
      sf: {},
      fin: {}
    };
  });
  // bump(time, fase, adversario): incrementa contador de cruzamento
  const bump = (t, fase, adv) => {
    matchups[t][fase][adv] = (matchups[t][fase][adv] || 0) + 1;
  };
  for (let sim = 0; sim < nS; sim++) {
    const at2 = {},
      df2 = {},
      el2 = {};
    teams.forEach(t => {
      el2[t] = elos[t];
      // Prefere atk/def evoluídos (vindos das sims A/B/C/D); senão deriva via initAD(elo).
      if (teamAD && teamAD[t]) {
        at2[t] = teamAD[t].atk;
        df2[t] = teamAD[t].def;
      } else {
        const i = lg.initAD(elos[t]);
        at2[t] = i.atk;
        df2[t] = i.def;
      }
    });
    const s2L = (a, b) => {
      const {
        mc: m1,
        mf: m2
      } = getML(cfg, 'CB');
      const l1 = calcL(at2[a], df2[a], at2[b], df2[b], el2[a], el2[b], m1, m2, cfg.homeAdv, eo, cfg.c0Log);
      const g1a = poissonRandom(l1.lC),
        g1b = poissonRandom(l1.lF);
      const l2 = calcL(at2[b], df2[b], at2[a], df2[a], el2[b], el2[a], m1, m2, cfg.homeAdv, eo, cfg.c0Log);
      const g2b = poissonRandom(l2.lC),
        g2a = poissonRandom(l2.lF);
      const aa = g1a + g2a,
        ab2 = g1b + g2b;
      return aa > ab2 ? a : ab2 > aa ? b : Math.random() < 0.5 ? a : b;
    };
    // s2L_R32: variante que respeita IDA/VOLTA reais quando disponíveis.
    // ida={ga,gb} (a=mandante ida, b=visitante ida). volta inverte mando.
    // Se ida real existe: simula apenas o gap restante. Se ambas existem: vencedor determinístico.
    const s2L_R32 = (a, b, ida, volta) => {
      const {
        mc: m1,
        mf: m2
      } = getML(cfg, 'CB');
      let g1a, g1b, g2a, g2b;
      if (ida) {
        g1a = ida.ga;
        g1b = ida.gb;
      } else {
        const l1 = calcL(at2[a], df2[a], at2[b], df2[b], el2[a], el2[b], m1, m2, cfg.homeAdv, eo, cfg.c0Log);
        g1a = poissonRandom(l1.lC);
        g1b = poissonRandom(l1.lF);
      }
      if (volta) {
        g2b = volta.ga;
        g2a = volta.gb;
      } // mando inverte: ga=gols mandante volta=b
      else {
        const l2 = calcL(at2[b], df2[b], at2[a], df2[a], el2[b], el2[a], m1, m2, cfg.homeAdv, eo, cfg.c0Log);
        g2b = poissonRandom(l2.lC);
        g2a = poissonRandom(l2.lF);
      }
      const aa = g1a + g2a,
        ab2 = g1b + g2b;
      return aa > ab2 ? a : ab2 > aa ? b : CB_R16_SET.has(a) ? a : CB_R16_SET.has(b) ? b : Math.random() < 0.5 ? a : b;
    };
    const sFin = (a, b) => {
      const mn = cfg.mnMM;
      const r2 = eo ? (() => {
        const d = el2[a] - el2[b];
        const e = 1 / (1 + Math.pow(10, -d / 400));
        return {
          lC: mn * (0.5 + e),
          lF: mn * (0.5 + (1 - e))
        };
      })() : {
        lC: Math.max(0.2, mn * at2[a] * df2[b]),
        lF: Math.max(0.2, mn * at2[b] * df2[a])
      };
      const ga = poissonRandom(r2.lC),
        gb = poissonRandom(r2.lF);
      return ga > gb ? a : gb > ga ? b : Math.random() < 0.5 ? a : b;
    };
    // R32: adversários fixos (CB_R32). Aplica IDA/VOLTA reais quando existem (CB_RES_IDA/VOLTA).
    CB_R32.forEach(([ia, ib]) => {
      bump(teams[ia], 'r32', teams[ib]);
      bump(teams[ib], 'r32', teams[ia]);
    });
    const r32 = CB_R32.map(([ia, ib], idx) => s2L_R32(teams[ia], teams[ib], CB_RES_IDA[idx] || null, CB_RES_VOLTA[idx] || null));
    // R16: chaveamento real (sorteio já realizado) quando os 16 vencedores reais avançaram.
    const allReal16 = r32.length === 16 && r32.every(w => CB_R16_SET.has(w));
    let r16p = [];
    if (allReal16) {
      for (const [na, nb] of CB_R16_PAIRS) {
        bump(na, 'r16', nb);
        bump(nb, 'r16', na);
        r16p.push(s2L(na, nb));
      }
    } else {
      const sh16 = shuffle(r32);
      for (let i = 0; i < sh16.length; i += 2) {
        const a = sh16[i],
          b = sh16[i + 1];
        bump(a, 'r16', b);
        bump(b, 'r16', a);
        r16p.push(s2L(a, b));
      }
    }
    const sh8 = shuffle(r16p);
    const qfp = [];
    for (let i = 0; i < sh8.length; i += 2) {
      const a = sh8[i],
        b = sh8[i + 1];
      bump(a, 'qf', b);
      bump(b, 'qf', a);
      qfp.push(s2L(a, b));
    }
    const sh4 = shuffle(qfp);
    bump(sh4[0], 'sf', sh4[1]);
    bump(sh4[1], 'sf', sh4[0]);
    bump(sh4[2], 'sf', sh4[3]);
    bump(sh4[3], 'sf', sh4[2]);
    const sfp = [s2L(sh4[0], sh4[1]), s2L(sh4[2], sh4[3])];
    bump(sfp[0], 'fin', sfp[1]);
    bump(sfp[1], 'fin', sfp[0]);
    const fin = sFin(sfp[0], sfp[1]);
    r32.forEach(w => ct[w].r16++);
    r16p.forEach(w => ct[w].qf++);
    qfp.forEach(w => ct[w].sf++);
    sfp.forEach(w => ct[w].fin++);
    ct[fin].ch++;
  }
  // Normaliza matchups: cada {adversario:count} → array [{adv,pct}] ordenado desc
  const normMatchups = t => {
    const out = {};
    for (const fase of ['r32', 'r16', 'qf', 'sf', 'fin']) {
      const m = matchups[t][fase];
      const total = Object.values(m).reduce((s, v) => s + v, 0);
      out[fase] = Object.entries(m).map(([adv, c]) => ({
        adv,
        pct: total > 0 ? c / total * 100 : 0,
        count: c
      })).sort((a, b) => b.pct - a.pct);
    }
    return out;
  };
  return {
    probs: teams.map(t => {
      const ad = teamAD && teamAD[t] ? teamAD[t] : lg.initAD(elos[t]);
      return {
        time: t,
        elo: elos[t],
        atk: ad.atk,
        def: ad.def,
        r16: ct[t].r16 / nS * 100,
        qf: ct[t].qf / nS * 100,
        sf: ct[t].sf / nS * 100,
        fin: ct[t].fin / nS * 100,
        ch: ct[t].ch / nS * 100,
        matchups: normMatchups(t),
        evolved: !!(teamAD && teamAD[t])
      };
    }).sort((a, b) => b.ch - a.ch || b.elo - a.elo),
    nSims: nS
  };
};
const parseTab = (raw, nm, dates) => {
  const j = [];
  raw.forEach((s, ri) => {
    s.split(',').forEach(g => {
      const [c, f] = g.split('-');
      j.push({

      });

// Diagnóstico de integridade: verifica quantos resultados reais de cada série
// casam com a fixture. Para A/B/C usa match exato casa/fora/rodada (a CBF é a
// fonte das fixtures). Para D usa pairKey (agnóstico a mandante/ordem do par).
// Retorna também o ratio "seria casado pelo método antigo" para a D, documentando
// o impacto do fix implementado na v4.3.
const dataHealthReport = (SAT, SBT, SCT) => {
  const rep = {};
  // A/B/C: match exato
  const checkExact = (fixture, results, teams) => {
    const teamSet = new Set(teams);
    const fSet = new Set(fixture.map(j => `${j.casa}|${j.fora}|${j.rodada}`));
    const misses = [];
    for (const r of results) {
      if (!teamSet.has(r.c) || !teamSet.has(r.f)) {
        misses.push({
          ...r,
          reason: 'time desconhecido'
        });
        continue;
      }
      if (!fSet.has(`${r.c}|${r.f}|${r.r}`)) {
        misses.push({
          ...r,
          reason: 'par/rodada não existe na fixture'
        });
      }
    }
    return {
      total: results.length,
      matched: results.length - misses.length,
      misses
    };
  };
  rep.A = checkExact(SAT, SA_RES, Object.keys(SA_RANKING));
  rep.B = checkExact(SBT, SB_RES, Object.keys(SB_RANKING));
  rep.C = checkExact(SCT, SC_RES, Object.keys(SC_RANKING));
  // D: método antigo (match exato) vs novo (pairKey)
  const tabD = SD_REAL_TAB;
  const tabDExactSet = new Set(tabD.map(j => `${j.casa}|${j.fora}|${j.rodada}`));
  const tabDPairSet = new Set(tabD.map(j => pairKey(j.casa, j.fora, j.rodada)));
  const teamSetD = new Set(SD_TIMES);
  let dExact = 0,
    dPair = 0;
  const dMisses = [];
  for (const r of SD_RES) {
    if (!teamSetD.has(r.c) || !teamSetD.has(r.f)) {
      dMisses.push({
        ...r,
        reason: 'time desconhecido'
      });
      continue;
    }
    if (tabDExactSet.has(`${r.c}|${r.f}|${r.r}`)) dExact++;
    if (tabDPairSet.has(pairKey(r.c, r.f, r.r))) dPair++;else dMisses.push({
      ...r,
      reason: 'par/turno não existe na fixture'
    });
  }
  rep.D = {
    total: SD_RES.length,
    matched: dPair,
    matchedOld: dExact,
    misses: dMisses
  };
  return rep;
};

// v4.35: validador estrutural de fixtures (#7). Roda 100% no navegador. Detecta
// regressões na hora de ingerir dados: confrontos duplicados, mando desbalanceado,
// returno que deixou de espelhar o turno, time jogando 2× na rodada, etc.
const fixtureIntegrity = (SAT, SBT, SCT) => {
  const rep = {};
  const groupByRound = tab => {
    const R = {};
    tab.forEach(j => {
      (R[j.rodada] = R[j.rodada] || []).push([j.casa, j.fora]);
    });
    return R;
  };
  const checkLeague = (tab, nTeams, type) => {
    const checks = [];
    const R = groupByRound(tab);
    const rounds = Object.keys(R).map(Number).sort((a, b) => a - b);
    const nR = type === 'duplo' ? (nTeams - 1) * 2 : nTeams - 1;
    checks.push({
      nome: `${nR} rodadas`,
      ok: rounds.length === nR,
      det: `${rounds.length} encontradas`
    });
    const badR = [];
    rounds.forEach(r => {
      const games = R[r];
      const ts = new Set();
      games.forEach(([c, f]) => {
        ts.add(c);
        ts.add(f);
      });
      if (games.length !== nTeams / 2 || ts.size !== nTeams) badR.push(`R${r}(${games.length}j/${ts.size}t)`);
    });
    checks.push({
      nome: `cada rodada: ${nTeams / 2} jogos, ${nTeams} times distintos`,
      ok: badR.length === 0,
      det: badR.length ? badR.join(' ') : 'todas ok'
    });
    const expTotal = type === 'duplo' ? nTeams * (nTeams - 1) : nTeams * (nTeams - 1) / 2;
    checks.push({
      nome: `${expTotal} jogos no total`,
      ok: tab.length === expTotal,
      det: `${tab.length}`
    });
    const ordered = {};
    tab.forEach(j => {
      const k = j.casa + '>' + j.fora;
      ordered[k] = (ordered[k] || 0) + 1;
    });
    const dupOrd = Object.entries(ordered).filter(([, v]) => v > 1);
    checks.push({
      nome: 'sem confronto+mando repetido',
      ok: dupOrd.length === 0,
      det: dupOrd.length ? dupOrd.slice(0, 4).map(([k, v]) => k.replace('>', ' x ') + `×${v}`).join(', ') : '0 repetidos'
    });
    const unord = {};
    tab.forEach(j => {
      const k = [j.casa, j.fora].sort().join('|');
      unord[k] = (unord[k] || 0) + 1;
    });
    const expEach = type === 'duplo' ? 2 : 1;
    const badPairs = Object.entries(unord).filter(([, v]) => v !== expEach);
    checks.push({
      nome: `cada confronto aparece ${expEach}×`,
      ok: badPairs.length === 0,
      det: badPairs.length ? badPairs.slice(0, 4).map(([k, v]) => k.replace('|', '-') + `×${v}`).join(', ') : 'todos ok'
    });
    if (type === 'duplo') {
      const home = {},
        away = {};
      tab.forEach(j => {
        home[j.casa] = (home[j.casa] || 0) + 1;
        away[j.fora] = (away[j.fora] || 0) + 1;
      });
      const exp = nTeams - 1;
      const badHA = Object.keys(home).filter(t => home[t] !== exp || away[t] !== exp);
      checks.push({
        nome: `${exp} casa / ${exp} fora por time`,
        ok: badHA.length === 0,
        det: badHA.length ? badHA.slice(0, 4).join(', ') : 'balanceado'
      });
      const mirrorBad = [];
      for (let i = 1; i <= nR / 2; i++) {
        const t = (R[i] || []).map(([c, f]) => [c, f].sort().join('|')).sort().join(';');
        const ret = (R[i + nR / 2] || []).map(([c, f]) => [c, f].sort().join('|')).sort().join(';');
        if (t !== ret) mirrorBad.push(`R${i}↔R${i + nR / 2}`);
      }
      checks.push({
        nome: 'returno espelha o turno',
        ok: mirrorBad.length === 0,
        det: mirrorBad.length ? mirrorBad.slice(0, 4).join(' ') : 'ok'
      });
    }
    return checks;
  };
  const checkD = () => {
    const checks = [];
    const tab = SD_REAL_TAB;
    checks.push({
      nome: '480 jogos no total',
      ok: tab.length === 480,
      det: `${tab.length}`
    });
    const byR = {};
    tab.forEach(j => {
      (byR[j.rodada] = byR[j.rodada] || []).push(j);
    });
    const rounds = Object.keys(byR).map(Number).sort((a, b) => a - b);
    const badRD = rounds.filter(r => byR[r].length !== 48);
    checks.push({
      nome: '10 rodadas × 48 jogos',
      ok: rounds.length === 10 && badRD.length === 0,
      det: rounds.length !== 10 ? `${rounds.length} rodadas` : badRD.length ? badRD.map(r => `R${r}(${byR[r].length})`).join(' ') : 'ok'
    });
    const byG = {};
    tab.forEach(j => {
      (byG[j.grupo] = byG[j.grupo] || []).push(j);
    });
    const badG = [],
      badGPair = [],
      badGHA = [],
      crossGroup = [];
    Object.keys(byG).forEach(g => {
      const games = byG[g];
      if (games.length !== 30) badG.push(`G${+g + 1}(${games.length})`);
      const unord = {},
        home = {},
        away = {},
        ts = new Set();
      games.forEach(j => {
        const k = [j.casa, j.fora].sort().join('|');
        unord[k] = (unord[k] || 0) + 1;
        home[j.casa] = (home[j.casa] || 0) + 1;
        away[j.fora] = (away[j.fora] || 0) + 1;
        ts.add(j.casa);
        ts.add(j.fora);
      });
      if (Object.values(unord).some(v => v !== 2)) badGPair.push(`G${+g + 1}`);
      [...ts].forEach(t => {
        if ((home[t] || 0) !== 5 || (away[t] || 0) !== 5) badGHA.push(`G${+g + 1}:${t}`);
      });
      const grpTeams = new Set(SD_GRUPOS[+g] || []);
      games.forEach(j => {
        if (!grpTeams.has(j.casa) || !grpTeams.has(j.fora)) crossGroup.push(`ref${j.ref}`);
      });
    });
    checks.push({
      nome: '16 grupos × 30 jogos',
      ok: Object.keys(byG).length === 16 && badG.length === 0,
      det: badG.length ? badG.join(' ') : 'ok'
    });
    checks.push({
      nome: 'cada confronto 2× por grupo',
      ok: badGPair.length === 0,
      det: badGPair.length ? badGPair.join(' ') : 'ok'
    });
    checks.push({
      nome: '5 casa / 5 fora por time',
      ok: badGHA.length === 0,
      det: badGHA.length ? badGHA.slice(0, 4).join(' ') : 'balanceado'
    });
    checks.push({
      nome: 'times só dentro do próprio grupo',
      ok: crossGroup.length === 0,
      det: crossGroup.length ? crossGroup.slice(0, 4).join(' ') : 'ok'
    });
    const multiPlay = [];
    rounds.forEach(r => {
      const cnt = {};
      byR[r].forEach(j => {
        cnt[j.casa] = (cnt[j.casa] || 0) + 1;
        cnt[j.fora] = (cnt[j.fora] || 0) + 1;
      });
      Object.entries(cnt).forEach(([t, v]) => {
        if (v > 1) multiPlay.push(`R${r}:${t}`);
      });
    });
    checks.push({
      nome: 'time joga ≤1× por rodada',
      ok: multiPlay.length === 0,
      det: multiPlay.length ? multiPlay.slice(0, 4).join(' ') : 'ok'
    });
    return checks;
  };
  rep.A = {
    checks: checkLeague(SAT, 20, 'duplo')
  };
  rep.B = {
    checks: checkLeague(SBT, 20, 'duplo')
  };
  rep.C = {
    checks: checkLeague(SCT, 20, 'unico')
  };
  rep.D = {
    checks: checkD()
  };
  ['A', 'B', 'C', 'D'].forEach(s => {
    rep[s].okCount = rep[s].checks.filter(c => c.ok).length;
    rep[s].total = rep[s].checks.length;
  });
  return rep;
};
