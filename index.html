<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#022c22">
<meta name="description" content="Simulador Monte Carlo do Brasileirão 2026 — Séries A, B, C, D e Copa do Brasil. Motor Poisson + ELO + ATK/DEF.">

<title>Brasileirão 2026 — Simulador</title>

<!-- PWA / iOS -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Brasileirão 26">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">

<!-- Tailwind via CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React 18 (UMD) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Babel standalone para transpilar JSX no browser -->
<script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>

<!-- Fonte Outfit (usada no app) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  html, body, #root {
    background: #020617;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }
  body {
    margin: 0;
    font-family: 'Outfit', system-ui, -apple-system, sans-serif;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  /* Loader inicial enquanto Babel transpila o app — alguns segundos no mobile */
  .boot {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #a7f3d0;
    font-family: 'Outfit', sans-serif;
    background: radial-gradient(ellipse at center, #064e3b 0%, #022c22 70%, #020617 100%);
    z-index: 9999;
    transition: opacity 0.4s ease;
  }
  .boot.hide { opacity: 0; pointer-events: none; }
  .boot__logo {
    width: 88px; height: 88px;
    border-radius: 22px;
    background: linear-gradient(135deg, #022c22 0%, #064e3b 55%, #022c22 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 800; letter-spacing: -2px;
    color: #fff;
    box-shadow: 0 8px 32px rgba(16, 185, 129, 0.25), 0 0 0 1px rgba(16, 185, 129, 0.15);
    margin-bottom: 18px;
  }
  .boot__logo sub { font-size: 16px; font-weight: 700; vertical-align: super; margin-left: 2px; color: #a7f3d0; }
  .boot__title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .boot__subtitle { font-size: 12px; opacity: 0.7; margin-bottom: 20px; }
  .boot__bar {
    width: 200px; height: 3px;
    background: rgba(16, 185, 129, 0.2);
    border-radius: 99px; overflow: hidden;
  }
  .boot__bar::after {
    content: ''; display: block;
    width: 40%; height: 100%;
    background: linear-gradient(90deg, transparent, #10b981, transparent);
    animation: slide 1.4s ease-in-out infinite;
  }
  @keyframes slide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
</style>
</head>
<body>

<div class="boot" id="boot">
  <div class="boot__logo">B<sub>26</sub></div>
  <div class="boot__title">Brasileirão 2026</div>
  <div class="boot__subtitle">Carregando simulador…</div>
  <div class="boot__bar"></div>
</div>

<div id="root"></div>

<!-- O Babel standalone interceptará scripts tipo "text/babel" e transpilará -->
<script type="text/babel" data-presets="react" src="app.jsx"></script>

<script>
  // Esconde o loader quando o React tiver montado em #root
  const boot = document.getElementById('boot');
  const root = document.getElementById('root');
  const obs = new MutationObserver(() => {
    if (root.children.length > 0) {
      boot.classList.add('hide');
      setTimeout(() => boot.remove(), 500);
      obs.disconnect();
    }
  });
  obs.observe(root, { childList: true });
  // Fallback: se algo der errado, esconde depois de 30s
  setTimeout(() => { boot.classList.add('hide'); }, 30000);

  // Service worker (PWA)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('SW registrado'))
        .catch(err => console.warn('SW falhou:', err));
    });
  }
</script>

</body>
</html>
